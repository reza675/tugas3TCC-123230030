runtime: nodejs20
service: default

handlers:
  - url: /
    static_files: dist/index.html
    upload: dist/index.html

  - url: /(.*)
    static_files: dist/\1
    upload: dist/(.*)
    
# Tambahkan ini supaya hemat (untuk testing)
automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 0
  max_instances: 1